name: CI

# Split job model (matches the pattern in the owner's Ledger repo,
# .github/workflows/ci.yml). Each suite runs in its own job so a failure
# names itself at the gate (lint vs typecheck vs build vs test) instead of
# collapsing into one opaque red dot, and so each is independently
# requireable in GitHub branch protection.
#
# Job ids below (lint, typecheck, build, test) ARE THE
# REQUIRED-STATUS-CHECK CONTRACT for the branch-protection rule this repo
# does not have yet. Renaming a job id here means re-pinning that rule.
#
# This is the Next.js stack (see CLAUDE.md "READ FIRST"). The legacy
# Vite/Netlify app and its `functions` job (netlify/functions/*.js syntax
# checks) are gone along with netlify/ itself — there is no functions
# directory left to check. The money-path logic that job existed to protect
# now lives in ordinary TS under the same lint/typecheck/build/test gates as
# everything else, plus its own 1498-test Vitest suite, which this workflow
# now actually runs (`test` job below). Before this, the new suite was wired
# into no CI job at all.
#
# `develop` does not exist as a branch yet at the time this workflow is
# added; it's created immediately after. Triggers reference it now so
# there's no follow-up edit required once it exists — an inert trigger for
# a branch that doesn't exist yet is harmless, unlike an inert job.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel a stale run on the same ref when a newer push/PR update
# supersedes it, so a quick sequence of pushes doesn't queue redundant runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # `next lint`. Gates on whatever the real count is today, not a
      # softened version of it: plain `npm run lint`, no continue-on-error,
      # no `|| true`.
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # `next build`. Overlaps with `typecheck` (tsc runs again as part of
      # the Next build) but that duplication is what buys build its own
      # independently requireable, independently named status check — a
      # build failure that isn't a type error should not have to hide
      # behind a job called "typecheck" to be seen. Needs no secrets: Stripe
      # and Supabase clients are constructed lazily, and /prints is
      # force-dynamic. next/font/google fetches fonts at build time, which
      # is fine here because CI has network access.
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # `vitest run`. This is where the money-path logic lives:
      # computeOrderAmounts(), PRICE_BY_SIZE, estimateTaxRate,
      # estimateShipping, plus the rest of the 1498-test suite. Before this
      # job existed, that suite ran nowhere in CI.
      - run: npm test
