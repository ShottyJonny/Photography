# Dependabot configuration for Jon Hoffman Photography.
#
# Posture: lightweight dependency monitoring for a solo-dev public repo.
# - Weekly cadence for routine version updates — daily would be noise with
#   one person reviewing.
# - Group minor + patch npm updates into a single PR per week. Majors stay
#   individual so a breaking-change review isn't smuggled into a group.
# - GitHub Actions updates tracked on the same weekly cadence.
# - Dependabot *security* updates are a separate GitHub setting (Settings
#   -> Security & analysis -> Dependabot security updates) and fire
#   independently of this schedule, on new advisory disclosure.
#
# target-branch: develop on both entries. Automated PRs must never target
# main, because merging main triggers a live Stripe deploy (see CLAUDE.md).
# The first Dependabot run after this config landed opened 12 PRs against
# main — including a stripe 19 -> 22 major on the payment path — which is
# exactly the outcome this pins shut.
#
# Those 12 PRs were opened before `develop` existed. Dependabot closes and
# re-opens against the new target on its next run; the originals do not
# retarget themselves.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # All non-breaking npm bumps (runtime + dev) land in one weekly PR.
      # Majors stay individual so each gets its own review.
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      gha-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
